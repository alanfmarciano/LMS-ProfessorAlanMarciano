<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="30" font-family="Arial" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">INDÚSTRIA 4.0 - PILARES FUNDAMENTAIS</text>
  <text x="400" y="52" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">A Quarta Revolução Industrial</text>
  
  <!-- Grid of 6 pillars -->
  <!-- 1. Virtualização -->
  <rect x="30" y="70" width="230" height="190" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <circle cx="145" cy="110" r="35" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="145" y="105" font-family="Arial" font-size="24" fill="#e94560" text-anchor="middle" font-weight="bold">V</text>
  <text x="145" y="160" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">VIRTUALIZAÇÃO</text>
  <text x="145" y="180" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">Gêmeos Digitais</text>
  <text x="145" y="195" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">(Digital Twins)</text>
  <text x="145" y="220" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Simulação 3D</text>
  <text x="145" y="235" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">da realidade</text>
  
  <!-- 2. Descentralização -->
  <rect x="285" y="70" width="230" height="190" rx="10" fill="#16213e" stroke="#f39c12" stroke-width="2"/>
  <circle cx="400" cy="110" r="35" fill="#0f3460" stroke="#f39c12" stroke-width="2"/>
  <circle cx="385" cy="100" r="8" fill="#f39c12"/>
  <circle cx="415" cy="100" r="8" fill="#f39c12"/>
  <circle cx="385" cy="120" r="8" fill="#f39c12"/>
  <circle cx="415" cy="120" r="8" fill="#f39c12"/>
  <circle cx="400" cy="145" r="5" fill="#f39c12" stroke="#0f3460" stroke-width="3"/>
  <line x1="385" y1="105" x2="395" y2="143" stroke="#f39c12" stroke-width="1"/>
  <line x1="415" y1="105" x2="405" y2="143" stroke="#f39c12" stroke-width="1"/>
  <line x1="385" y1="120" x2="392" y2="145" stroke="#f39c12" stroke-width="1"/>
  <line x1="415" y1="120" x2="408" y2="145" stroke="#f39c12" stroke-width="1"/>
  <text x="400" y="185" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">DESCENTRALIZAÇÃO</text>
  <text x="400" y="205" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">Decisões autonome</text>
  <text x="400" y="220" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">sem servidor central</text>
  <text x="400" y="245" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">IoT Independente</text>
  
  <!-- 3. Interoperabilidade -->
  <rect x="540" y="70" width="230" height="190" rx="10" fill="#16213e" stroke="#27ae60" stroke-width="2"/>
  <circle cx="620" cy="130" r="40" fill="#0f3460" stroke="#27ae60" stroke-width="2"/>
  <text x="620" y="125" font-family="Arial" font-size="12" fill="#27ae60" text-anchor="middle">Siemens</text>
  <text x="620" y="140" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">S7-1500</text>
  <circle cx="655" cy="115" r="20" fill="#0f3460" stroke="#3498db" stroke-width="2"/>
  <text x="655" y="120" font-family="Arial" font-size="7" fill="#3498db" text-anchor="middle">ABB</text>
  <circle cx="655" cy="145" r="20" fill="#0f3460" stroke="#9b59b6" stroke-width="2"/>
  <text x="655" y="150" font-family="Arial" font-size="7" fill="#9b59b6" text-anchor="middle">Fanuc</text>
  <line x1="640" y1="130" x2="635" y2="125" stroke="#27ae60" stroke-width="2"/>
  <line x1="640" y1="130" x2="635" y2="145" stroke="#27ae60" stroke-width="2"/>
  <text x="655" y="195" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">INTEROPERABILIDADE</text>
  <text x="655" y="215" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">Equipamentos de</text>
  <text x="655" y="230" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">fabricantes diferentes</text>
  <text x="655" y="250" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Protocolo OPC UA</text>
  
  <!-- 4. Modularidade -->
  <rect x="30" y="280" width="230" height="190" rx="10" fill="#16213e" stroke="#3498db" stroke-width="2"/>
  <rect x="60" y="310" width="60" height="40" fill="#3498db"/>
  <rect x="125" y="310" width="60" height="40" fill="#27ae60"/>
  <rect x="190" y="310" width="60" height="40" fill="#e94560"/>
  <rect x="60" y="355" width="60" height="40" fill="#9b59b6"/>
  <rect x="125" y="355" width="60" height="40" fill="#f39c12"/>
  <rect x="190" y="355" width="60" height="40" fill="#1abc9c"/>
  <line x1="90" y1="310" x2="90" y2="355" stroke="#fff" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="155" y1="310" x2="155" y2="355" stroke="#fff" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="220" y1="310" x2="220" y2="355" stroke="#fff" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="145" y="420" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">MODULARIDADE</text>
  <text x="145" y="440" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">Blocos intercambiáveis</text>
  <text x="145" y="455" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">como Lego</text>
  
  <!-- 5. Tempo Real -->
  <rect x="285" y="280" width="230" height="190" rx="10" fill="#16213e" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="400" cy="330" r="30" fill="#0f3460" stroke="#e74c3c" stroke-width="2"/>
  <text x="400" y="320" font-family="Arial" font-size="8" fill="#e74c3c">ms</text>
  <text x="400" y="335" font-family="Arial" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">&lt;1</text>
  <circle cx="330" cy="360" r="20" fill="#e74c3c" opacity="0.3"/>
  <circle cx="470" cy="360" r="20" fill="#e74c3c" opacity="0.5"/>
  <circle cx="400" cy="380" r="20" fill="#e74c3c" opacity="0.7"/>
  <text x="400" y="415" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">TEMPO REAL</text>
  <text x="400" y="435" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">Decisões em</text>
  <text x="400" y="450" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">milissegundos</text>
  <text x="400" y="465" font-family="Arial" font-size="9" fill="#e74c3c" text-anchor="middle">Latência &lt;1ms</text>
  
  <!-- 6. Customização -->
  <rect x="540" y="280" width="230" height="190" rx="10" fill="#16213e" stroke="#9b59b6" stroke-width="2"/>
  <rect x="570" y="310" width="80" height="30" rx="3" fill="#e94560"/>
  <text x="610" y="330" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Lote A</text>
  <rect x="660" y="310" width="80" height="30" rx="3" fill="#f39c12"/>
  <text x="700" y="330" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Lote B</text>
  <rect x="570" y="350" width="80" height="30" rx="3" fill="#27ae60"/>
  <text x="610" y="370" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Lote C</text>
  <rect x="660" y="350" width="80" height="30" rx="3" fill="#3498db"/>
  <text x="700" y="370" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Lote D</text>
  <rect x="570" y="390" width="170" height="30" rx="3" fill="#9b59b6"/>
  <text x="655" y="410" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Lote Personalizado</text>
  <text x="655" y="450" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">CUSTOMIZAÇÃO</text>
  <text x="655" y="470" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">Massa personalizada</text>
</svg>