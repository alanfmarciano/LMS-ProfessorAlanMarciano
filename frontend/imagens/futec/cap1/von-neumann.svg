<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e94560"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#fff" text-anchor="middle" font-weight="bold">ARQUITETURA DE VON NEUMANN</text>
  
  <!-- Main Memory -->
  <rect x="300" y="80" width="200" height="120" rx="10" fill="#0f3460" stroke="#e94560" stroke-width="3"/>
  <text x="400" y="115" font-family="Arial" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">MEMÓRIA</text>
  <text x="400" y="135" font-family="Arial" font-size="12" fill="#a8d8ff" text-anchor="middle">Dados e Instruções</text>
  <text x="400" y="155" font-family="Arial" font-size="12" fill="#a8d8ff" text-anchor="middle">(Programa Armazenado)</text>
  
  <!-- CPU -->
  <rect x="300" y="280" width="200" height="120" rx="10" fill="#16213e" stroke="#e94560" stroke-width="3"/>
  <text x="400" y="315" font-family="Arial" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">CPU</text>
  <text x="400" y="335" font-family="Arial" font-size="12" fill="#a8d8ff" text-anchor="middle">Unidade de Controle</text>
  <text x="400" y="355" font-family="Arial" font-size="12" fill="#a8d8ff" text-anchor="middle">ULA (Unidade Lógica Aritmética)</text>
  <text x="400" y="375" font-family="Arial" font-size="12" fill="#a8d8ff" text-anchor="middle">Registradores</text>
  
  <!-- Input -->
  <rect x="50" y="280" width="120" height="60" rx="10" fill="#0f3460" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="315" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">ENTRADA</text>
  <text x="110" y="332" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">(Teclado, Mouse)</text>
  
  <!-- Output -->
  <rect x="630" y="280" width="120" height="60" rx="10" fill="#0f3460" stroke="#60a5fa" stroke-width="2"/>
  <text x="690" y="315" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">SAÍDA</text>
  <text x="690" y="332" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">(Monitor, Impressora)</text>
  
  <!-- Arrows -->
  <!-- Memory to CPU -->
  <line x1="400" y1="200" x2="400" y2="280" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="245" font-family="Arial" font-size="11" fill="#e9c46a">Dados/Instruções</text>
  
  <!-- CPU to Memory -->
  <line x1="400" y1="280" x2="400" y2="200" stroke="#e94560" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Input to CPU -->
  <line x1="170" y1="310" x2="300" y2="310" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- CPU to Output -->
  <line x1="500" y1="310" x2="630" y2="310" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- BUS (External) -->
  <rect x="80" y="420" width="640" height="40" rx="20" fill="#0f3460" stroke="#e9c46a" stroke-width="2"/>
  <text x="400" y="445" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">BUS (Sistema de Comunicação)</text>
  
  <!-- Legend -->
  <text x="50" y="480" font-family="Arial" font-size="10" fill="#888">Fluxo de Dados: Sólido | Endereços: Tracejado</text>
</svg>