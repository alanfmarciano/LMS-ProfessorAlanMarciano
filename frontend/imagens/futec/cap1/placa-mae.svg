<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="30" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">COMPONENTES DA PLACA-MÃE</text>
  
  <!-- PCB Board -->
  <rect x="50" y="50" width="700" height="400" rx="10" fill="#2c3e50" stroke="#34495e" stroke-width="3"/>
  
  <!-- CPU Socket -->
  <rect x="300" y="80" width="200" height="100" rx="5" fill="#1a1a2e" stroke="#e94560" stroke-width="3"/>
  <text x="400" y="115" font-family="Arial" font-size="12" fill="#e94560" text-anchor="middle" font-weight="bold">SOCKET CPU</text>
  <text x="400" y="135" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">AMD AM5 / Intel LGA1700</text>
  <text x="400" y="155" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Encaixe do Processador</text>
  
  <!-- RAM Slots -->
  <rect x="80" y="100" width="120" height="30" rx="3" fill="#0f3460" stroke="#60a5fa" stroke-width="2"/>
  <text x="140" y="120" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">SLOT DDR5</text>
  
  <rect x="80" y="140" width="120" height="30" rx="3" fill="#0f3460" stroke="#60a5fa" stroke-width="2"/>
  <text x="140" y="160" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">SLOT DDR5</text>
  
  <rect x="80" y="180" width="120" height="30" rx="3" fill="#0f3460" stroke="#60a5fa" stroke-width="2"/>
  <text x="140" y="200" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">SLOT DDR5</text>
  
  <rect x="80" y="220" width="120" height="30" rx="3" fill="#0f3460" stroke="#60a5fa" stroke-width="2"/>
  <text x="140" y="240" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">SLOT DDR5</text>
  
  <!-- PCIe Slots -->
  <rect x="600" y="80" width="30" height="150" rx="2" fill="#16213e" stroke="#e9c46a" stroke-width="2"/>
  <text x="615" y="160" font-family="Arial" font-size="8" fill="#e9c46a" text-anchor="middle" transform="rotate(90, 615, 160)">PCIe x16</text>
  
  <rect x="640" y="80" width="30" height="120" rx="2" fill="#16213e" stroke="#e9c46a" stroke-width="2"/>
  <text x="655" y="140" font-family="Arial" font-size="8" fill="#e9c46a" text-anchor="middle" transform="rotate(90, 655, 140)">PCIe x4</text>
  
  <rect x="680" y="80" width="30" height="80" rx="2" fill="#16213e" stroke="#e9c46a" stroke-width="2"/>
  <text x="695" y="120" font-family="Arial" font-size="8" fill="#e9c46a" text-anchor="middle" transform="rotate(90, 695, 120)">PCIe x1</text>
  
  <!-- Chipset -->
  <rect x="300" y="220" width="200" height="60" rx="5" fill="#0f3460" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="245" font-family="Arial" font-size="12" fill="#27ae60" text-anchor="middle" font-weight="bold">CHIPSET</text>
  <text x="400" y="262" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">Intel Z790 / AMD X670</text>
  <text x="400" y="275" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Gerenciador de Tráfego</text>
  
  <!-- BIOS/UEFI -->
  <rect x="550" y="260" width="100" height="40" rx="5" fill="#8e44ad" stroke="#fff" stroke-width="2"/>
  <text x="600" y="285" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">BIOS/UEFI</text>
  
  <!-- SATA Ports -->
  <text x="550" y="330" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">SATA</text>
  <circle cx="530" cy="345" r="5" fill="#60a5fa"/>
  <circle cx="550" cy="345" r="5" fill="#60a5fa"/>
  <circle cx="570" cy="345" r="5" fill="#60a5fa"/>
  <circle cx="590" cy="345" r="5" fill="#60a5fa"/>
  
  <!-- M.2 Slot -->
  <rect x="300" y="300" width="150" height="25" rx="3" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="375" y="317" font-family="Arial" font-size="10" fill="#e94560" text-anchor="middle">SLOT M.2 NVMe</text>
  
  <!-- I/O Panel -->
  <rect x="550" y="380" width="180" height="60" rx="5" fill="#34495e" stroke="#95a5a6" stroke-width="2"/>
  <text x="640" y="405" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">PAINEL TRASEIRO</text>
  <text x="640" y="420" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">USB, HDMI, RJ-45, Áudio</text>
  
  <!-- Power Connector -->
  <rect x="200" y="350" width="60" height="40" rx="3" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
  <text x="230" y="375" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">24-pin</text>
  <text x="230" y="388" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">ATX Power</text>
  
  <!-- CPU Power -->
  <rect x="350" y="190" width="50" height="20" rx="3" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
  <text x="375" y="204" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">8-pin</text>
  
  <!-- Labels -->
  <line x1="140" y1="55" x2="140" y2="95" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="50" y="60" font-family="Arial" font-size="9" fill="#60a5fa">Slots de Memória RAM</text>
  
  <line x1="615" y1="75" x2="615" y2="55" stroke="#e9c46a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="680" y="60" font-family="Arial" font-size="9" fill="#e9c46a">Slots de Expansão PCIe</text>
  
  <line x1="640" y1="250" x2="640" y2="235" stroke="#8e44ad" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="690" y="245" font-family="Arial" font-size="9" fill="#8e44ad">Chip de Firmware</text>
</svg>