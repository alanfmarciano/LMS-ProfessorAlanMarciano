<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <rect width="700" height="500" fill="#1a1a2e"/>
  
  <text x="350" y="30" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">LÓGICA DE PROGRAMAÇÃO - FLUXOGRAMA</text>
  <text x="350" y="52" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">Controle de Acesso de Estacionamento</text>
  
  <!-- Start -->
  <ellipse cx="350" cy="70" rx="60" ry="25" fill="#e94560" stroke="#fff" stroke-width="2"/>
  <text x="350" y="75" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">INÍCIO</text>
  
  <!-- Arrow -->
  <line x1="350" y1="95" x2="350" y2="120" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Input -->
  <polygon points="300,140 400,140 350,180" fill="#0f3460" stroke="#60a5fa" stroke-width="2"/>
  <text x="350" y="165" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">Ler Placa</text>
  
  <line x1="350" y1="180" x2="350" y2="210" stroke="#60a5fa" stroke-width="2"/>
  
  <!-- Decision -->
  <polygon points="250,210 350,260 450,210 350,160" fill="#f39c12" stroke="#fff" stroke-width="2"/>
  <text x="350" y="215" font-family="Arial" font-size="10" fill="#1a1a2e" text-anchor="middle">Vaga</text>
  <text x="350" y="228" font-family="Arial" font-size="10" fill="#1a1a2e" text-anchor="middle">Disponível?</text>
  
  <!-- Yes branch -->
  <line x1="250" y1="210" x2="180" y2="210" stroke="#27ae60" stroke-width="2"/>
  <line x1="180" y1="210" x2="180" y2="280" stroke="#27ae60" stroke-width="2"/>
  <text x="200" y="235" font-family="Arial" font-size="10" fill="#27ae60" text-anchor="middle">SIM</text>
  
  <!-- Process: Open Gate -->
  <rect x="120" y="280" width="120" height="50" rx="5" fill="#27ae60" stroke="#fff" stroke-width="2"/>
  <text x="180" y="305" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">Abrir Cancela</text>
  <text x="180" y="320" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">vagas = vagas - 1</text>
  
  <line x1="180" y1="330" x2="180" y2="360" stroke="#60a5fa" stroke-width="2"/>
  
  <!-- Output: Welcome -->
  <rect x="110" y="360" width="140" height="40" rx="5" fill="#0f3460" stroke="#27ae60" stroke-width="2"/>
  <text x="180" y="385" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">"Bem-vindo!"</text>
  
  <!-- No branch -->
  <line x1="450" y1="210" x2="520" y2="210" stroke="#e74c3c" stroke-width="2"/>
  <line x1="520" y1="210" x2="520" y2="280" stroke="#e74c3c" stroke-width="2"/>
  <text x="495" y="235" font-family="Arial" font-size="10" fill="#e74c3c" text-anchor="middle">NÃO</text>
  
  <!-- Process: Deny -->
  <rect x="460" y="280" width="120" height="50" rx="5" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
  <text x="520" y="305" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">Fechar Cancela</text>
  <text x="520" y="320" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Manter Bloqueado</text>
  
  <line x1="520" y1="330" x2="520" y2="360" stroke="#60a5fa" stroke-width="2"/>
  
  <!-- Output: Denied -->
  <rect x="450" y="360" width="140" height="40" rx="5" fill="#0f3460" stroke="#e74c3c" stroke-width="2"/>
  <text x="520" y="385" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">"Lotado!"</text>
  
  <!-- Merge -->
  <line x1="180" y1="400" x2="180" y2="430" stroke="#60a5fa" stroke-width="2"/>
  <line x1="520" y1="400" x2="520" y2="430" stroke="#60a5fa" stroke-width="2"/>
  <line x1="180" y1="430" x2="520" y2="430" stroke="#60a5fa" stroke-width="2"/>
  <line x1="350" y1="430" x2="350" y2="455" stroke="#60a5fa" stroke-width="2"/>
  
  <!-- End -->
  <ellipse cx="350" cy="480" rx="60" ry="25" fill="#e94560" stroke="#fff" stroke-width="2"/>
  <text x="350" y="485" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">FIM</text>
  
  <!-- Legend Box -->
  <rect x="550" y="50" width="140" height="180" rx="5" fill="#16213e" stroke="#34495e"/>
  <text x="620" y="70" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">LEGENDA</text>
  
  <ellipse cx="570" y="95" rx="15" ry="8" fill="#e94560"/>
  <text x="600" y="100" font-family="Arial" font-size="9" fill="#a8d8ff">Início/Fim</text>
  
  <polygon points="570,120 600,140 540,140" fill="#0f3460"/>
  <text x="600" y="135" font-family="Arial" font-size="9" fill="#a8d8ff">Entrada</text>
  
  <rect x="545" y="150" width="50" height="30" rx="3" fill="#27ae60"/>
  <text x="600" y="170" font-family="Arial" font-size="9" fill="#a8d8ff">Processo</text>
  
  <polygon points="550,195 570,215 590,195 570,175" fill="#f39c12"/>
  <text x="600" y="210" font-family="Arial" font-size="9" fill="#a8d8ff">Decisão</text>
  
  <rect x="545" y="220" width="50" height="30" rx="3" fill="#0f3460" stroke="#27ae60"/>
  <text x="600" y="240" font-family="Arial" font-size="9" fill="#a8d8ff">Saída</text>
</svg>