<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="30" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">ARQUITETURA SaaS - SOFTWARE AS A SERVICE</text>
  <text x="400" y="52" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">Software Entregue via Nuvem</text>
  
  <!-- Cloud -->
  <ellipse cx="400" cy="180" rx="180" ry="80" fill="#0f3460" stroke="#60a5fa" stroke-width="3"/>
  <text x="400" y="165" font-family="Arial" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">NUVEM</text>
  <text x="400" y="185" font-family="Arial" font-size="10" fill="#a8d8ff" text-anchor="middle">AWS | Azure | Google Cloud</text>
  
  <!-- Server in Cloud -->
  <rect x="330" y="200" width="140" height="70" rx="5" fill="#16213e" stroke="#60a5fa" stroke-width="2"/>
  <rect x="340" y="210" width="120" height="15" rx="2" fill="#27ae60"/>
  <rect x="340" y="230" width="120" height="15" rx="2" fill="#3498db"/>
  <rect x="340" y="250" width="120" height="15" rx="2" fill="#9b59b6"/>
  <text x="400" y="290" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Servidor de Aplicação</text>
  
  <!-- Database -->
  <rect x="350" y="300" width="100" height="50" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <ellipse cx="400" cy="325" rx="35" ry="20" fill="#e94560"/>
  <text x="400" y="330" font-family="Courier" font-size="9" fill="#fff" text-anchor="middle">BD</text>
  <text x="400" y="365" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Banco de Dados</text>
  
  <!-- Connection Lines -->
  <line x1="400" y1="270" x2="400" y2="300" stroke="#60a5fa" stroke-width="2"/>
  
  <!-- Users -->
  <!-- User 1 - Desktop -->
  <rect x="80" y="150" width="80" height="60" rx="5" fill="#2c3e50" stroke="#27ae60"/>
  <rect x="85" y="160" width="70" height="45" rx="3" fill="#0f3460"/>
  <rect x="115" y="215" width="10" height="15" fill="#34495e"/>
  <text x="120" y="230" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">PC</text>
  
  <!-- User 2 - Laptop -->
  <rect x="80" y="250" width="80" height="50" rx="5" fill="#2c3e50" stroke="#3498db"/>
  <rect x="85" y="255" width="70" height="35" rx="3" fill="#0f3460"/>
  <rect x="90" y="290" width="60" height="8" rx="2" fill="#34495e"/>
  <text x="120" y="318" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Notebook</text>
  
  <!-- User 3 - Mobile -->
  <rect x="70" y="340" width="50" height="80" rx="5" fill="#2c3e50" stroke="#9b59b6"/>
  <rect x="75" y="350" width="40" height="65" rx="3" fill="#0f3460"/>
  <rect x="90" y="395" width="10" height="20" rx="2" fill="#34495e"/>
  <text x="95" y="435" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Celular</text>
  
  <!-- User 4 - Tablet -->
  <rect x="150" y="340" width="80" height="60" rx="5" fill="#2c3e50" stroke="#f39c12"/>
  <rect x="155" y="350" width="70" height="45" rx="3" fill="#0f3460"/>
  <text x="190" y="418" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Tablet</text>
  
  <!-- Connecting Lines -->
  <path d="M160 180 Q250 180 330 200" stroke="#60a5fa" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
  <path d="M160 275 Q250 220 340 210" stroke="#60a5fa" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
  <path d="M120 380 Q250 300 350 305" stroke="#60a5fa" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
  <path d="M190 380 Q280 300 350 305" stroke="#60a5fa" stroke-width="1" fill="none" stroke-dasharray="4,4"/>
  
  <!-- Comparison Panel -->
  <rect x="550" y="80" width="230" height="300" rx="5" fill="#16213e" stroke="#34495e"/>
  <text x="665" y="105" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">TRADICIONAL vs SaaS</text>
  
  <!-- Traditional -->
  <rect x="565" y="125" width="200" height="60" rx="3" fill="#e74c3c" opacity="0.3"/>
  <text x="665" y="145" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">TRADICIONAL</text>
  <text x="665" y="165" font-family="Arial" font-size="9" fill="#a8d8ff" text-anchor="middle">CD/ Instalação local</text>
  <text x="665" y="178" font-family="Arial" font-size="9" fill="#a8d8ff" text-anchor="middle">Atualização manual</text>
  
  <!-- Arrow -->
  <text x="665" y="205" font-family="Arial" font-size="14" fill="#e9c46a" text-anchor="middle">→</text>
  
  <!-- SaaS -->
  <rect x="565" y="215" width="200" height="60" rx="3" fill="#27ae60" opacity="0.3"/>
  <text x="665" y="235" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">SaaS</text>
  <text x="665" y="255" font-family="Arial" font-size="9" fill="#a8d8ff" text-anchor="middle">Navegador/ App</text>
  <text x="665" y="268" font-family="Arial" font-size="9" fill="#a8d8ff" text-anchor="middle">Atualização automática</text>
  
  <!-- Benefits -->
  <text x="665" y="300" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">VANTAGENS</text>
  
  <text x="575" y="325" font-family="Arial" font-size="10" fill="#27ae60">✓</text>
  <text x="590" y="325" font-family="Arial" font-size="9" fill="#a8d8ff">Zero instalação</text>
  
  <text x="575" y="345" font-family="Arial" font-size="10" fill="#27ae60">✓</text>
  <text x="590" y="345" font-family="Arial" font-size="9" fill="#a8d8ff">Acesso universal</text>
  
  <text x="575" y="365" font-family="Arial" font-size="10" fill="#27ae60">✓</text>
  <text x="590" y="365" font-family="Arial" font-size="9" fill="#a8d8ff">Custo por uso</text>
  
  <text x="575" y="385" font-family="Arial" font-size="10" fill="#27ae60">✓</text>
  <text x="590" y="385" font-family="Arial" font-size="9" fill="#a8d8ff">Escalabilidade</text>
  
  <text x="575" y="405" font-family="Arial" font-size="10" fill="#27ae60">✓</text>
  <text x="590" y="405" font-family="Arial" font-size="9" fill="#a8d8ff">Manutenção zero</text>
</svg>