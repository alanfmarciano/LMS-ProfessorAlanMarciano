<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="35" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">FONTE DE ALIMENTAÇÃO (PSU) - CORAÇÃO ENERGÉTICO</text>
  
  <!-- PSU anatomy -->
  <rect x="150" y="55" width="300" height="140" fill="#16213e" stroke="#e94560" stroke-width="2" rx="5"/>
  <text x="300" y="75" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">FONTE ATX - 500W A 750W</text>
  
  <!-- Modular connectors -->
  <rect x="170" y="90" width="60" height="30" fill="#0f3460" rx="3"/>
  <text x="200" y="108" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">24 PIN</text>
  <text x="200" y="118" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">ATX Main</text>
  
  <rect x="245" y="90" width="50" height="30" fill="#0f3460" rx="3"/>
  <text x="270" y="108" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">8 PIN</text>
  <text x="270" y="118" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">CPU Power</text>
  
  <rect x="310" y="90" width="50" height="30" fill="#16213e" stroke="#4ecca3" rx="3"/>
  <text x="335" y="108" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">PCIe 6+2</text>
  <text x="335" y="118" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">GPU Power</text>
  
  <rect x="375" y="90" width="50" height="30" fill="#0f3460" rx="3"/>
  <text x="400" y="108" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">SATA</text>
  <text x="400" y="118" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">HDD/SSD</text>
  
  <!-- Fan -->
  <circle cx="300" cy="150" r="30" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <circle cx="300" cy="150" r="20" fill="#16213e"/>
  <text x="300" y="155" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">FAN</text>
  
  <!-- 80 Plus ratings -->
  <text x="300" y="225" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">CERTIFICAÇÃO 80 PLUS</text>
  
  <rect x="30" y="240" width="540" height="70" fill="#16213e" rx="5"/>
  
  <rect x="50" y="255" width="100" height="40" fill="#16213e" stroke="#0f3460" rx="3"/>
  <text x="100" y="275" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">80+ Bronze</text>
  <text x="100" y="288" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">82-85% eficiência</text>
  
  <rect x="165" y="255" width="100" height="40" fill="#16213e" stroke="#4ecca3" rx="3"/>
  <text x="215" y="275" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">80+ Gold</text>
  <text x="215" y="288" font-family="Arial" font-size="8" fill="#4ecca3" text-anchor="middle">87-90% eficiência</text>
  
  <rect x="280" y="255" width="100" height="40" fill="#16213e" stroke="#e94560" rx="3"/>
  <text x="330" y="275" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">80+ Platinum</text>
  <text x="330" y="288" font-family="Arial" font-size="8" fill="#e94560" text-anchor="middle">90-92% eficiência</text>
  
  <rect x="395" y="255" width="100" height="40" fill="#0f3460" stroke="#fff" rx="3"/>
  <text x="445" y="275" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">80+ Titanium</text>
  <text x="445" y="288" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">92-96% eficiência</text>
  
  <!-- Wattage guide -->
  <text x="300" y="335" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">ESCOLHA DA POTÊNCIA</text>
  
  <rect x="30" y="350" width="180" height="45" fill="#16213e" rx="5"/>
  <text x="120" y="370" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Office Basic (i3/Ryzen 3)</text>
  <text x="120" y="383" font-family="Arial" font-size="10" fill="#e94560" text-anchor="middle">400W-500W</text>
  
  <rect x="220" y="350" width="180" height="45" fill="#16213e" rx="5"/>
  <text x="310" y="370" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Workstation (i5/i7/Ryzen 5/7)</text>
  <text x="310" y="383" font-family="Arial" font-size="10" fill="#e94560" text-anchor="middle">550W-650W</text>
  
  <rect x="410" y="350" width="160" height="45" fill="#0f3460" stroke="#e94560" rx="5"/>
  <text x="490" y="370" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Gamer/Design (com GPU)</text>
  <text x="490" y="383" font-family="Arial" font-size="10" fill="#e94560" text-anchor="middle">650W-850W</text>
</svg>