<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="35" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">TIPOS DE GABINETE - FORMAT FACTOR</text>
  
  <!-- Full Tower -->
  <rect x="30" y="60" width="160" height="140" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="110" y="85" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">FULL TOWER</text>
  <rect x="60" y="100" width="100" height="80" fill="#0f3460" rx="3"/>
  <text x="110" y="150" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">450+ mm altura</text>
  <text x="110" y="170" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">7+ slots PCIe</text>
  <text x="110" y="185" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Servidores/Workstations</text>
  
  <!-- Mid Tower -->
  <rect x="210" y="60" width="160" height="140" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="5"/>
  <text x="290" y="85" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">MID TOWER</text>
  <rect x="240" y="100" width="100" height="80" fill="#16213e" rx="3"/>
  <text x="290" y="150" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">420-450 mm</text>
  <text x="290" y="170" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Mais comum (gamers)</text>
  <text x="290" y="185" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">7 slots PCIe</text>
  
  <!-- Mini Tower -->
  <rect x="390" y="60" width="100" height="140" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="440" y="85" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">MINI</text>
  <rect x="405" y="100" width="70" height="80" fill="#0f3460" rx="3"/>
  <text x="440" y="150" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">350-400mm</text>
  <text x="440" y="170" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">4 slots</text>
  <text x="440" y="185" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Compactos</text>
  
  <!-- SFF -->
  <rect x="510" y="60" width="70" height="140" fill="#16213e" stroke="#e94560" stroke-width="2" rx="5"/>
  <text x="545" y="85" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">SFF</text>
  <rect x="515" y="100" width="60" height="50" fill="#0f3460" rx="3"/>
  <text x="545" y="130" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Small</text>
  <text x="545" y="170" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">2-3 slots</text>
  <text x="545" y="185" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Office</text>
  
  <!-- Form factor table -->
  <text x="300" y="230" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">MOTHERBOARD FORM FACTORS</text>
  
  <rect x="30" y="245" width="540" height="80" fill="#16213e" rx="5"/>
  
  <rect x="50" y="260" width="120" height="50" fill="#0f3460" rx="3"/>
  <text x="110" y="280" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">ATX</text>
  <text x="110" y="295" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">305×244mm</text>
  <text x="110" y="305" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">4 slots RAM</text>
  
  <rect x="185" y="260" width="120" height="50" fill="#16213e" stroke="#e94560" rx="3"/>
  <text x="245" y="280" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Micro-ATX</text>
  <text x="245" y="295" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">244×244mm</text>
  <text x="245" y="305" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">2-4 slots RAM</text>
  
  <rect x="320" y="260" width="120" height="50" fill="#16213e" rx="3"/>
  <text x="380" y="280" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Mini-ITX</text>
  <text x="380" y="295" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">170×170mm</text>
  <text x="380" y="305" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">2 slots RAM</text>
  
  <rect x="455" y="260" width="100" height="50" fill="#16213e" rx="3"/>
  <text x="505" y="280" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Flex-ATX</text>
  <text x="505" y="295" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">229×191mm</text>
  <text x="505" y="305" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">2 slots RAM</text>
  
  <!-- Airflow -->
  <text x="300" y="350" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">FLUXO DE AR (AIRFLOW)</text>
  
  <rect x="30" y="365" width="540" height="30" fill="#0f3460" rx="5"/>
  <text x="300" y="385" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">🏭 FRENTE → BAIXO (intake) | TOPO → ATRÁS (exhaust) | FONTE (PSU) → TRASEIRA (exhaust)</text>
</svg>