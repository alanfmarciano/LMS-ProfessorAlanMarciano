<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="35" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">ESPECIFICAÇÕES DE DESKTOP CORPORATIVO</text>
  
  <!-- Component breakdown -->
  <rect x="30" y="60" width="540" height="320" fill="#16213e" rx="5"/>
  
  <!-- CPU -->
  <rect x="50" y="80" width="230" height="55" fill="#0f3460" rx="3"/>
  <text x="165" y="100" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">🧠 CPU (Processador)</text>
  <text x="165" y="118" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Intel Core i5/i7 ou AMD Ryzen 5/7</text>
  
  <!-- RAM -->
  <rect x="300" y="80" width="250" height="55" fill="#0f3460" rx="3"/>
  <text x="425" y="100" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">💾 RAM (Memória)</text>
  <text x="425" y="118" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">16GB DDR4/DDR5 (ideal: 16GB)</text>
  
  <!-- Storage -->
  <rect x="50" y="150" width="230" height="55" fill="#16213e" stroke="#e94560" rx="3"/>
  <text x="165" y="170" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">💿 ARMAZENAMENTO</text>
  <text x="165" y="188" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">SSD NVMe 512GB + opcional HD 1-4TB</text>
  
  <!-- PSU -->
  <rect x="300" y="150" width="250" height="55" fill="#16213e" stroke="#e94560" rx="3"/>
  <text x="425" y="170" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">⚡ FONTE (PSU)</text>
  <text x="425" y="188" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">500W 80+ Bronze (ideal: 80+ Gold)</text>
  
  <!-- GPU -->
  <rect x="50" y="220" width="230" height="55" fill="#0f3460" rx="3"/>
  <text x="165" y="240" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">🎮 GPU (Placa de Vídeo)</text>
  <text x="165" y="258" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Integrada (office) ou dedicada (design)</text>
  
  <!-- Cooling -->
  <rect x="300" y="220" width="250" height="55" fill="#0f3460" rx="3"/>
  <text x="425" y="240" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">❄️ RESFRIAMENTO</text>
  <text x="425" y="258" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Air cooling (tower) ou water cooling</text>
  
  <!-- Form factors -->
  <text x="300" y="300" font-family="Arial" font-size="12" fill="#e94560" text-anchor="middle" font-weight="bold">FORMATOS DE GABINETE</text>
  
  <rect x="50" y="315" width="100" height="50" fill="#16213e" rx="3"/>
  <text x="100" y="335" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Full Tower</text>
  <text x="100" y="350" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Maior, mais slots</text>
  
  <rect x="160" y="315" width="100" height="50" fill="#16213e" rx="3"/>
  <text x="210" y="335" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Mid Tower</text>
  <text x="210" y="350" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Mais comum</text>
  
  <rect x="270" y="315" width="100" height="50" fill="#16213e" rx="3"/>
  <text x="320" y="335" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Mini Tower</text>
  <text x="320" y="350" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Compacto</text>
  
  <rect x="380" y="315" width="100" height="50" fill="#0f3460" stroke="#e94560" rx="3"/>
  <text x="430" y="335" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">SFF</text>
  <text x="430" y="350" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Small Form Factor</text>
  
  <rect x="490" y="315" width="70" height="50" fill="#16213e" rx="3"/>
  <text x="525" y="335" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">NUC</text>
  <text x="525" y="350" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Mini PC</text>
</svg>