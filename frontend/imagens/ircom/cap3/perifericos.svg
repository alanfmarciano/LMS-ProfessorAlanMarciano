<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="35" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">PERIFÉRICOS E INTERFACES DE CONEXÃO</text>
  
  <!-- Input devices -->
  <rect x="30" y="60" width="120" height="100" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="90" y="85" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">ENTRADA</text>
  <text x="90" y="110" font-family="Arial" font-size="20" text-anchor="middle">⌨️🖱️</text>
  <text x="90" y="135" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Teclado, Mouse,</text>
  <text x="90" y="148" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Scanner, Webcam</text>
  
  <!-- Output devices -->
  <rect x="165" y="60" width="120" height="100" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="225" y="85" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">SAÍDA</text>
  <text x="225" y="110" font-family="Arial" font-size="20" text-anchor="middle">🖥️🖨️🔊</text>
  <text x="225" y="135" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Monitor, Impressora,</text>
  <text x="225" y="148" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Caixa de som</text>
  
  <!-- Storage devices -->
  <rect x="300" y="60" width="120" height="100" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="360" y="85" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">ARMAZENAMENTO</text>
  <text x="360" y="110" font-family="Arial" font-size="20" text-anchor="middle">💾💿</text>
  <text x="360" y="135" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">HD, SSD, Pen Drive,</text>
  <text x="360" y="148" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">DVD/Blu-ray</text>
  
  <!-- Network devices -->
  <rect x="435" y="60" width="135" height="100" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="5"/>
  <text x="502" y="85" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">REDE</text>
  <text x="502" y="110" font-family="Arial" font-size="20" text-anchor="middle">🌐📡</text>
  <text x="502" y="135" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Ethernet, Wi-Fi,</text>
  <text x="502" y="148" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Bluetooth, 4G/5G</text>
  
  <!-- USB types -->
  <text x="300" y="190" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">TIPOS DE CONECTORES USB</text>
  
  <rect x="30" y="205" width="130" height="70" fill="#16213e" rx="5"/>
  <text x="95" y="228" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">USB-A</text>
  <text x="95" y="245" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Retangular (2.0/3.0)</text>
  <text x="95" y="260" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Teclado, mouse, pen</text>
  
  <rect x="175" y="205" width="130" height="70" fill="#16213e" rx="5"/>
  <text x="240" y="228" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">USB-C</text>
  <text x="240" y="245" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Reversível, rápido</text>
  <text x="240" y="260" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Celular, notebook</text>
  
  <rect x="320" y="205" width="130" height="70" fill="#0f3460" stroke="#e94560" rx="5"/>
  <text x="385" y="228" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">USB-B</text>
  <text x="385" y="245" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Quadrado (impressora)</text>
  <text x="385" y="260" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Impressora, scanner</text>
  
  <rect x="465" y="205" width="105" height="70" fill="#16213e" rx="5"/>
  <text x="517" y="228" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">microUSB</text>
  <text x="517" y="245" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Pequeno (antigo)</text>
  <text x="517" y="260" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Tablet, câmera</text>
  
  <!-- Speeds -->
  <text x="300" y="300" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">VELOCIDADES USB</text>
  
  <rect x="30" y="315" width="540" height="70" fill="#16213e" rx="5"/>
  
  <rect x="50" y="330" width="110" height="40" fill="#16213e" rx="3"/>
  <text x="105" y="348" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">USB 2.0</text>
  <text x="105" y="362" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">480 Mbps</text>
  
  <rect x="175" y="330" width="110" height="40" fill="#0f3460" rx="3"/>
  <text x="230" y="348" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">USB 3.0</text>
  <text x="230" y="362" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">5 Gbps</text>
  
  <rect x="300" y="330" width="110" height="40" fill="#0f3460" stroke="#4ecca3" rx="3"/>
  <text x="355" y="348" font-family="Arial" font-size="9" fill="#4ecca3" text-anchor="middle">USB 3.1</text>
  <text x="355" y="362" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">10 Gbps</text>
  
  <rect x="425" y="330" width="110" height="40" fill="#0f3460" stroke="#e94560" rx="3"/>
  <text x="480" y="348" font-family="Arial" font-size="9" fill="#e94560" text-anchor="middle">USB 3.2/4</text>
  <text x="480" y="362" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">20-40 Gbps</text>
</svg>