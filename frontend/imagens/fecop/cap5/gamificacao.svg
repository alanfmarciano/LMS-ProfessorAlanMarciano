<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="35" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">GAMIFICAÇÃO - ELEMENTOS E MOTIVAÇÃO</text>
  
  <!-- Gamification elements -->
  <rect x="30" y="60" width="170" height="100" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="115" y="85" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">🏆 BADGES</text>
  <text x="115" y="110" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Medalhas conquistadas</text>
  <text x="115" y="125" text-anchor="middle">🎖️ 🥇 ⭐ 🔥</text>
  <text x="115" y="145" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Reconhecimento visual</text>
  
  <rect x="215" y="60" width="170" height="100" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="300" y="85" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">📊 LEADERBOARD</text>
  <text x="300" y="110" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">1. Maria - 2.450 pts</text>
  <text x="300" y="125" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">2. João - 2.180 pts</text>
  <text x="300" y="140" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">3. Pedro - 1.980 pts</text>
  
  <rect x="400" y="60" width="170" height="100" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="485" y="85" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">🎯 MISSÕES</text>
  <text x="485" y="110" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Desafios diarios</text>
  <text x="485" y="125" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">📱 Completar perfil 50%</text>
  <text x="485" y="138" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">📚 Assistir 3 vídeos</text>
  <text x="485" y="151" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">📝 Fazer avaliação</text>
  
  <!-- Levels -->
  <text x="300" y="190" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">SISTEMA DE NÍVEIS (XP)</text>
  
  <rect x="30" y="205" width="540" height="80" fill="#16213e" rx="5"/>
  
  <!-- Level bar -->
  <rect x="50" y="225" width="500" height="20" fill="#0f3460" rx="10"/>
  <rect x="50" y="225" width="200" height="20" fill="#e94560" rx="10"/>
  <text x="300" y="240" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Nível 5 → Nível 6</text>
  
  <text x="70" y="265" font-family="Arial" font-size="9" fill="#fff">1.200 / 2.000 XP</text>
  <text x="530" y="265" font-family="Arial" font-size="9" fill="#aaa" text-anchor="end">800 XP restantes</text>
  
  <text x="300" y="255" font-family="Arial" font-size="20" text-anchor="middle">⬆️</text>
  
  <!-- Rewards -->
  <text x="300" y="310" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">RECOMPENSAS E RECONHECIMENTO</text>
  
  <rect x="30" y="325" width="120" height="60" fill="#0f3460" rx="5"/>
  <text x="90" y="350" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">� Rewards</text>
  <text x="90" y="365" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Pontos canjeáveis</text>
  <text x="90" y="377" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">por beneficios</text>
  
  <rect x="165" y="325" width="120" height="60" fill="#0f3460" rx="5"/>
  <text x="225" y="350" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">🏅 Ranking</text>
  <text x="225" y="365" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Top performers</text>
  <text x="225" y="377" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">no mural</text>
  
  <rect x="300" y="325" width="120" height="60" fill="#0f3460" rx="5"/>
  <text x="360" y="350" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">📜 Certificados</text>
  <text x="360" y="365" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Badges digitais</text>
  <text x="360" y="377" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle"> Linkedin</text>
  
  <rect x="435" y="325" width="120" height="60" fill="#16213e" stroke="#e94560" rx="5"/>
  <text x="495" y="350" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">🎁 Surpresas</text>
  <text x="495" y="365" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">Recompensas</text>
  <text x="495" y="377" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">inesperadas</text>
</svg>