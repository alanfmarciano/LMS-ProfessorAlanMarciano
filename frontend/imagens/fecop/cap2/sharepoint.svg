<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="35" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">SHAREPOINT - INTRANET CORPORATIVA</text>
  
  <!-- SharePoint logo representation -->
  <rect x="200" y="60" width="200" height="80" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="300" y="95" font-family="Arial" font-size="16" fill="#fff" text-anchor="middle">📁 SharePoint</text>
  <text x="300" y="120" font-family="Arial" font-size="12" fill="#aaa" text-anchor="middle">Biblioteca de Documentos</text>
  
  <!-- Document libraries -->
  <rect x="50" y="160" width="150" height="60" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="125" y="185" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">📄 Departamentos</text>
  <text x="125" y="205" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">TI | RH | VENDAS</text>
  
  <rect x="220" y="160" width="150" height="60" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="295" y="185" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">📊 Projetos</text>
  <text x="295" y="205" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Em Andamento</text>
  
  <rect x="390" y="160" width="150" height="60" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="465" y="185" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">📋 Políticas</text>
  <text x="465" y="205" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Normas e Procedimentos</text>
  
  <!-- Permissions flow -->
  <text x="300" y="260" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">CONTROLE DE ACESSO (PERMISSIONS)</text>
  
  <rect x="50" y="280" width="150" height="50" fill="#e94560" rx="5"/>
  <text x="125" y="305" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">👤 Leitura</text>
  <text x="125" y="320" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Visualizar apenas</text>
  
  <rect x="220" y="280" width="150" height="50" fill="#0f3460" stroke="#e94560" rx="5"/>
  <text x="295" y="305" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">✏️ Edição</text>
  <text x="295" y="320" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Editar e comentar</text>
  
  <rect x="390" y="280" width="150" height="50" fill="#16213e" stroke="#e94560" stroke-width="2" rx="5"/>
  <text x="465" y="305" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">⚙️ Controle Total</text>
  <text x="465" y="320" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Administrador</text>
  
  <!-- LGPD Principle -->
  <rect x="50" y="350" width="500" height="40" fill="#16213e" stroke="#e94560" stroke-width="1" rx="5"/>
  <text x="300" y="375" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">🔐 PRINCÍPIO DO MENOR PRIVILÉGIO (LGPD) - Dar apenas acesso necessário para cada função</text>
</svg>