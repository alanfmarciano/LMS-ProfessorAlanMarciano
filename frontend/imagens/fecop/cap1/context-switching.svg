<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="40" font-family="Arial" font-size="20" fill="#e94560" text-anchor="middle" font-weight="bold">CONTEXT SWITCHING</text>
  
  <!-- Timeline representation -->
  <line x1="50" y1="100" x2="550" y2="100" stroke="#e94560" stroke-width="2"/>
  
  <!-- Task blocks showing interruption -->
  <rect x="50" y="80" width="100" height="40" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="100" y="105" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">Tarefa A</text>
  
  <rect x="150" y="80" width="60" height="40" fill="#e94560" stroke="#fff" stroke-width="2"/>
  <text x="180" y="100" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">INTER</text>
  <text x="180" y="112" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">-RUPCÃO</text>
  
  <rect x="210" y="80" width="100" height="40" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="260" y="105" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">Tarefa B</text>
  
  <rect x="310" y="80" width="60" height="40" fill="#e94560" stroke="#fff" stroke-width="2"/>
  <text x="340" y="105" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">INTER</text>
  
  <rect x="370" y="80" width="100" height="40" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="420" y="105" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">Tarefa A</text>
  
  <!-- Legend -->
  <rect x="50" y="150" width="20" height="20" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="80" y="165" font-family="Arial" font-size="14" fill="#fff">Tempo perdido em troca de contexto</text>
  
  <rect x="50" y="180" width="20" height="20" fill="#e94560"/>
  <text x="80" y="195" font-family="Arial" font-size="14" fill="#fff">Interrupção (email, notificação)</text>
  
  <!-- Formula -->
  <text x="300" y="250" font-family="Arial" font-size="16" fill="#e94560" text-anchor="middle" font-weight="bold">FÓRMULA DE PRODUTIVIDADE</text>
  <rect x="100" y="270" width="400" height="50" fill="#0f3460" rx="10"/>
  <text x="300" y="300" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">Tempo Útil = Tempo Total - (Interrupções × Custo por Troca)</text>
  
  <!-- Timeboxes -->
  <text x="300" y="360" font-family="Arial" font-size="16" fill="#e94560" text-anchor="middle" font-weight="bold">TIMEBOXING</text>
  <rect x="100" y="330" width="120" height="30" fill="#16213e" stroke="#e94560"/>
  <text x="160" y="350" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">09:00-10:30</text>
  <rect x="240" y="330" width="120" height="30" fill="#16213e" stroke="#e94560"/>
  <text x="300" y="350" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">10:30-12:00</text>
  <rect x="380" y="330" width="120" height="30" fill="#16213e" stroke="#e94560"/>
  <text x="440" y="350" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">14:00-16:00</text>
</svg>