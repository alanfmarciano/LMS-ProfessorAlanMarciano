<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="35" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">AGENDA EXECUTIVA - SISTEMA INTEGRADO</text>
  
  <!-- Outlook Calendar Grid -->
  <rect x="50" y="60" width="500" height="200" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  
  <!-- Time column -->
  <text x="70" y="90" font-family="Arial" font-size="10" fill="#e94560">08:00</text>
  <text x="70" y="120" font-family="Arial" font-size="10" fill="#e94560">09:00</text>
  <text x="70" y="150" font-family="Arial" font-size="10" fill="#e94560">10:00</text>
  <text x="70" y="180" font-family="Arial" font-size="10" fill="#e94560">11:00</text>
  <text x="70" y="210" font-family="Arial" font-size="10" fill="#e94560">12:00</text>
  <text x="70" y="240" font-family="Arial" font-size="10" fill="#e94560">13:00</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="75" x2="550" y2="75" stroke="#0f3460" stroke-width="1"/>
  <line x1="100" y1="105" x2="550" y2="105" stroke="#0f3460" stroke-width="1"/>
  <line x1="100" y1="135" x2="550" y2="135" stroke="#0f3460" stroke-width="1"/>
  <line x1="100" y1="165" x2="550" y2="165" stroke="#0f3460" stroke-width="1"/>
  <line x1="100" y1="195" x2="550" y2="195" stroke="#0f3460" stroke-width="1"/>
  <line x1="100" y1="225" x2="550" y2="225" stroke="#0f3460" stroke-width="1"/>
  
  <!-- Events -->
  <rect x="120" y="78" width="180" height="25" fill="#e94560" rx="3"/>
  <text x="210" y="95" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Reunião de Diretoria</text>
  
  <rect x="320" y="108" width="200" height="25" fill="#0f3460" stroke="#e94560" rx="3"/>
  <text x="420" y="125" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Contabilidade</text>
  
  <rect x="120" y="168" width="150" height="25" fill="#16213e" stroke="#e94560" stroke-width="2" rx="3"/>
  <text x="195" y="185" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Bloqueado para Foco</text>
  
  <!-- Legend -->
  <text x="300" y="290" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">REGRAS DE OURO</text>
  
  <rect x="80" y="310" width="15" height="15" fill="#e94560"/>
  <text x="105" y="322" font-family="Arial" font-size="11" fill="#fff">Compromisso confirmado</text>
  
  <rect x="250" y="310" width="15" height="15" fill="#0f3460" stroke="#e94560"/>
  <text x="275" y="322" font-family="Arial" font-size="11" fill="#fff">Compromisso Pendente</text>
  
  <rect x="420" y="310" width="15" height="15" fill="#16213e" stroke="#e94560"/>
  <text x="445" y="322" font-family="Arial" font-size="11" fill="#fff">Tempo de Foco</text>
  
  <!-- Features -->
  <text x="300" y="360" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">✅ Reservas de Sala | ✅ Delegação | ✅ Calendários Compartilhados | ✅ Lembretes Automáticos</text>
</svg>