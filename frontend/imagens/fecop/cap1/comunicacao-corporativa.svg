<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="35" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">FLUXO DE COMUNICAÇÃO CORPORATIVA</text>
  
  <!-- Email icon -->
  <rect x="50" y="70" width="100" height="60" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="100" y="105" font-family="Arial" font-size="24" fill="#fff" text-anchor="middle">📧</text>
  <text x="100" y="150" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">EMAIL</text>
  
  <!-- Arrow -->
  <path d="M155 100 L195 100" stroke="#e94560" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Calendar icon -->
  <rect x="200" y="70" width="100" height="60" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="250" y="105" font-family="Arial" font-size="24" fill="#fff" text-anchor="middle">📅</text>
  <text x="250" y="150" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">AGENDA</text>
  
  <!-- Arrow -->
  <path d="M305 100 L345 100" stroke="#e94560" stroke-width="3"/>
  
  <!-- Teams icon -->
  <rect x="350" y="70" width="100" height="60" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="400" y="105" font-family="Arial" font-size="24" fill="#fff" text-anchor="middle">💬</text>
  <text x="400" y="150" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">TEAMS</text>
  
  <!-- Arrow -->
  <path d="M455 100 L495 100" stroke="#e94560" stroke-width="3"/>
  
  <!-- SharePoint icon -->
  <rect x="500" y="70" width="80" height="60" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="5"/>
  <text x="540" y="105" font-family="Arial" font-size="24" fill="#fff" text-anchor="middle">📁</text>
  <text x="540" y="150" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">SharePoint</text>
  
  <!-- Bottom section - Governance model -->
  <text x="300" y="200" font-family="Arial" font-size="16" fill="#e94560" text-anchor="middle" font-weight="bold">GOVERNANÇA DE COMUNICAÇÃO</text>
  
  <rect x="50" y="220" width="150" height="80" fill="#0f3460" rx="10"/>
  <text x="125" y="250" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">Resposta em</text>
  <text x="125" y="270" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">24-48h</text>
  
  <rect x="220" y="220" width="150" height="80" fill="#0f3460" rx="10"/>
  <text x="295" y="250" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">CC para</text>
  <text x="295" y="270" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">Rastreio</text>
  
  <rect x="390" y="220" width="150" height="80" fill="#0f3460" rx="10"/>
  <text x="465" y="250" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">Arquivo</text>
  <text x="465" y="270" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">Estruturado</text>
  
  <!-- Groups distribution -->
  <text x="300" y="340" font-family="Arial" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">GRUPOS DE DISTRIBUIÇÃO</text>
  
  <circle cx="100" cy="380" r="30" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="100" y="385" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">TI</text>
  
  <circle cx="200" cy="380" r="30" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="200" y="385" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">RH</text>
  
  <circle cx="300" cy="380" r="30" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="300" y="385" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">VENDAS</text>
  
  <circle cx="400" cy="380" r="30" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="400" y="385" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">DIRETORIA</text>
  
  <circle cx="500" cy="380" r="30" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="500" y="385" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">GERAL</text>
</svg>