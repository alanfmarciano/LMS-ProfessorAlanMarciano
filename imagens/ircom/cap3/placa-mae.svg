<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a2e"/>
  <text x="300" y="35" font-family="Arial" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">PLACA-MÃE - BACKBONE DO SISTEMA</text>
  
  <!-- Motherboard diagram -->
  <rect x="150" y="55" width="300" height="200" fill="#16213e" stroke="#e94560" stroke-width="3" rx="5"/>
  <text x="300" y="75" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">PLACA-MÃE</text>
  
  <!-- CPU Socket -->
  <rect x="200" y="90" width="80" height="60" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="3"/>
  <text x="240" y="115" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">SOCKET CPU</text>
  <text x="240" y="130" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">(LGA 1700)</text>
  
  <!-- RAM slots -->
  <rect x="300" y="90" width="130" height="30" fill="#16213e" stroke="#4ecca3" stroke-width="2" rx="3"/>
  <text x="365" y="110" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">SLOTS DDR5 (x4)</text>
  
  <!-- PCIe slots -->
  <rect x="180" y="160" width="200" height="25" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="2"/>
  <text x="280" y="177" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">PCIe x16 (GPU)</text>
  
  <rect x="180" y="190" width="100" height="20" fill="#16213e" stroke="#0f3460" rx="2"/>
  <text x="230" y="204" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">PCIe x4</text>
  
  <!-- Chipset -->
  <rect x="320" y="155" width="70" height="40" fill="#16213e" stroke="#e94560" stroke-width="2" rx="3"/>
  <text x="355" y="172" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">CHIPSET</text>
  <text x="355" y="185" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">(B760/H610)</text>
  
  <!-- M.2 -->
  <rect x="320" y="200" width="120" height="20" fill="#16213e" stroke="#4ecca3" rx="2"/>
  <text x="380" y="214" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">M.2 NVMe (SSD)</text>
  
  <!-- I/O Panel -->
  <rect x="180" y="225" width="200" height="25" fill="#0f3460" rx="2"/>
  <text x="280" y="242" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">PAINEL TRASEIRO (USB, HDMI, rede)</text>
  
  <!-- Power connectors -->
  <rect x="400" y="130" width="40" height="50" fill="#16213e" stroke="#e94560" stroke-width="2" rx="2"/>
  <text x="420" y="155" font-family="Arial" font-size="7" fill="#fff" text-anchor="middle" transform="rotate(90 420,155)">24PIN</text>
  
  <rect x="350" y="90" width="20" height="40" fill="#16213e" stroke="#e94560" stroke-width="2" rx="2"/>
  <text x="360" y="115" font-family="Arial" font-size="7" fill="#fff" text-anchor="middle" transform="rotate(-90 360,115)">CPU</text>
  
  <!-- Legend -->
  <text x="300" y="280" font-family="Arial" font-size="12" fill="#e94560" text-anchor="middle" font-weight="bold">COMPONENTES PRINCIPAIS</text>
  
  <rect x="30" y="295" width="250" height="90" fill="#16213e" rx="5"/>
  <text x="45" y="315" font-family="Arial" font-size="9" fill="#fff">• Soquete (Socket) - encaixe do CPU</text>
  <text x="45" y="330" font-family="Arial" font-size="9" fill="#fff">• Slots RAM - memória DDR4/DDR5</text>
  <text x="45" y="345" font-family="Arial" font-size="9" fill="#fff">• PCIe - placas de vídeo e expansão</text>
  <text x="45" y="360" font-family="Arial" font-size="9" fill="#fff">• Chipset - gerencia conexões</text>
  <text x="45" y="375" font-family="Arial" font-size="9" fill="#fff">• M.2 - encaixe SSD NVMe</text>
  
  <rect x="300" y="295" width="270" height="90" fill="#0f3460" rx="5"/>
  <text x="315" y="315" font-family="Arial" font-size="9" fill="#fff">• SATA - discos HD/SSD 2.5"/3.5"</text>
  <text x="315" y="330" font-family="Arial" font-size="9" fill="#fff">• USB headers - painel frontal</text>
  <text x="315" y="345" font-family="Arial" font-size="9" fill="#fff">• Conector ATX 24 pinos - energia</text>
  <text x="315" y="360" font-family="Arial" font-size="9" fill="#fff">• Conector CPU 8 pinos - CPU power</text>
  <text x="315" y="375" font-family="Arial" font-size="9" fill="#fff">• Painel E/S - portas traseiras</text>
</svg>