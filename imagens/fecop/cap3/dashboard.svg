  <text x="90" y="130" font-family="Arial" font-size="9" fill="#4ecca3" text-anchor="middle">↑ 12% vs mês anterior</text>
  
  <rect x="165" y="60" width="120" height="80" fill="#0f3460" rx="5"/>
  <text x="225" y="85" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Pedidos</text>
  <text x="225" y="110" font-family="Arial" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">1.847</text>
  <text x="225" y="130" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Últimos 30 dias</text>
  
  <rect x="300" y="60" width="120" height="80" fill="#0f3460" rx="5"/>
  <text x="360" y="85" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Tickets Fechados</text>
