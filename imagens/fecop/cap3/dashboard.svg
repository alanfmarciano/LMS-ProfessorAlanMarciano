  <text x="360" y="130" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Meta: 90%</text>
  
  <rect x="435" y="60" width="120" height="80" fill="#0f3460" rx="5"/>
  <text x="495" y="85" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Churn Rate</text>
