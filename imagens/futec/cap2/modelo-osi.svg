<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <rect width="800" height="550" fill="#1a1a2e"/>
  
  <text x="400" y="30" font-family="Arial" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">MODELO OSI - 7 CAMADAS</text>
  <text x="400" y="52" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">Open Systems Interconnection</text>
  
  <!-- Layer 7 - Application -->
  <rect x="50" y="70" width="700" height="55" rx="5" fill="#e94560" stroke="#fff" stroke-width="2"/>
  <text x="100" y="95" font-family="Arial" font-size="18" fill="#fff" font-weight="bold">7</text>
  <text x="150" y="95" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">APLICAÇÃO</text>
  <text x="400" y="88" font-family="Arial" font-size="11" fill="#fff">HTTP, FTP, SMTP, DNS, DHCP</text>
  <text x="600" y="105" font-family="Arial" font-size="10" fill="#1a1a2e">Interface usuário-rede</text>
  
  <!-- Layer 6 - Presentation -->
  <rect x="50" y="130" width="700" height="55" rx="5" fill="#f39c12" stroke="#fff" stroke-width="2"/>
  <text x="100" y="155" font-family="Arial" font-size="18" fill="#fff" font-weight="bold">6</text>
  <text x="150" y="155" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">APRESENTAÇÃO</text>
  <text x="400" y="148" font-family="Arial" font-size="11" fill="#fff">SSL/TLS, JPEG, PNG, ASCII, GIF</text>
  <text x="600" y="165" font-family="Arial" font-size="10" fill="#1a1a2e">Formatação de dados</text>
  
  <!-- Layer 5 - Session -->
  <rect x="50" y="190" width="700" height="55" rx="5" fill="#27ae60" stroke="#fff" stroke-width="2"/>
  <text x="100" y="215" font-family="Arial" font-size="18" fill="#fff" font-weight="bold">5</text>
  <text x="150" y="215" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">SESSÃO</text>
  <text x="400" y="208" font-family="Arial" font-size="11" fill="#fff">NetBIOS, RPC, PPTP</text>
  <text x="600" y="225" font-family="Arial" font-size="10" fill="#1a1a2e">Gerencia conexões</text>
  
  <!-- Layer 4 - Transport -->
  <rect x="50" y="250" width="700" height="55" rx="5" fill="#3498db" stroke="#fff" stroke-width="2"/>
  <text x="100" y="275" font-family="Arial" font-size="18" fill="#fff" font-weight="bold">4</text>
  <text x="150" y="275" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">TRANSPORTE</text>
  <text x="400" y="268" font-family="Arial" font-size="11" fill="#fff">TCP (confiável) | UDP (rápido)</text>
  <text x="600" y="285" font-family="Arial" font-size="10" fill="#1a1a2e">Controle de fluxo</text>
  
  <!-- Layer 3 - Network -->
  <rect x="50" y="310" width="700" height="55" rx="5" fill="#9b59b6" stroke="#fff" stroke-width="2"/>
  <text x="100" y="335" font-family="Arial" font-size="18" fill="#fff" font-weight="bold">3</text>
  <text x="150" y="335" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">REDE</text>
  <text x="400" y="328" font-family="Arial" font-size="11" fill="#fff">IP, ICMP, OSPF, BGP, ARP</text>
  <text x="600" y="345" font-family="Arial" font-size="10" fill="#1a1a2e">Roteamento</text>
  
  <!-- Layer 2 - Data Link -->
  <rect x="50" y="370" width="700" height="55" rx="5" fill="#1abc9c" stroke="#fff" stroke-width="2"/>
  <text x="100" y="395" font-family="Arial" font-size="18" fill="#fff" font-weight="bold">2</text>
  <text x="150" y="395" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">ENLACE</text>
  <text x="400" y="388" font-family="Arial" font-size="11" fill="#fff">Ethernet, Wi-Fi, MAC Address, Switch</text>
  <text x="600" y="405" font-family="Arial" font-size="10" fill="#1a1a2e">Endereço físico</text>
  
  <!-- Layer 1 - Physical -->
  <rect x="50" y="430" width="700" height="55" rx="5" fill="#95a5a6" stroke="#fff" stroke-width="2"/>
  <text x="100" y="455" font-family="Arial" font-size="18" fill="#1a1a2e" font-weight="bold">1</text>
  <text x="150" y="455" font-family="Arial" font-size="16" fill="#1a1a2e" font-weight="bold">FÍSICA</text>
  <text x="400" y="448" font-family="Arial" font-size="11" fill="#1a1a2e">Cabos, Fibra Óptica, USB, Hub</text>
  <text x="600" y="465" font-family="Arial" font-size="10" fill="#1a1a2e">Sinais elétricos</text>
  
  <!-- Arrows -->
  <polygon points="780,45 795,65 765,65" fill="#e94560"/>
  <polygon points="780,520 795,500 765,500" fill="#95a5a6"/>
  
  <!-- Troubleshooting Guide -->
  <rect x="50" y="500" width="700" height="40" rx="5" fill="#16213e"/>
  <text x="400" y="520" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">Diagnóstico: Comece da Camada 1 (física) e suba até a 7 (aplicação)</text>
</svg>