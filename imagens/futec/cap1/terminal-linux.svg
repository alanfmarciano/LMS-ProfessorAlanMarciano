<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="700" height="450">
  <rect width="700" height="450" fill="#1a1a2e"/>
  
  <!-- Terminal Window -->
  <rect x="30" y="30" width="640" height="390" rx="10" fill="#0d0d0d" stroke="#333" stroke-width="3"/>
  
  <!-- Title Bar -->
  <rect x="30" y="30" width="640" height="30" rx="10" fill="#333"/>
  <rect x="30" y="50" width="640" height="10" fill="#333"/>
  
  <!-- Window Buttons -->
  <circle cx="55" cy="45" r="6" fill="#e74c3c"/>
  <circle cx="75" cy="45" r="6" fill="#f39c12"/>
  <circle cx="95" cy="45" r="6" fill="#27ae60"/>
  
  <!-- Title -->
  <text x="350" y="50" font-family="Courier" font-size="12" fill="#888" text-anchor="middle">alan@servidor-usina:~$</text>
  
  <!-- Terminal Content -->
  <text x="50" y="90" font-family="Courier" font-size="14" fill="#27ae60">alan@servidor-usina:~$ <tspan fill="#fff">ls -la /var/log</tspan></text>
  
  <text x="50" y="115" font-family="Courier" font-size="12" fill="#888">drwxr-xr-x  2 root   root  4096 abr 20 09:00 .</text>
  <text x="50" y="132" font-family="Courier" font-size="12" fill="#888">drwxr-xr-x  5 root   root  4096 abr 15 14:30 ..</text>
  <text x="50" y="149" font-family="Courier" font-size="12" fill="#60a5fa">-rw-r-----  1 syslog   syslog  152340 abr 20 08:00 auth.log</text>
  <text x="50" y="166" font-family="Courier" font-size="12" fill="#60a5fa">-rw-r-----  1 syslog   syslog  892340 abr 20 09:00 syslog</text>
  <text x="50" y="183" font-family="Courier" font-size="12" fill="#e9c46a">-rw-rw-rw-  1 www-data www-data 45210 abr 20 07:30 access.log</text>
  <text x="50" y="200" font-family="Courier" font-size="12" fill="#e94560">-rw-r-----  1 root     root   12340 abr 20 06:00 error.log</text>
  <text x="50" y="217" font-family="Courier" font-size="12" fill="#888">-rw-r-----  1 root     root   89420 abr 19 23:55 kern.log</text>
  
  <text x="50" y="255" font-family="Courier" font-size="14" fill="#27ae60">alan@servidor-usina:~$ <tspan fill="#fff">grep "ERRO" /var/log/syslog | head -5</tspan></text>
  
  <text x="50" y="280" font-family="Courier" font-size="12" fill="#e94560">Abr 20 08:15:23 servidor kernel: [12345.678901] ERROR: Disco em 95% de capacidade</text>
  <text x="50" y="297" font-family="Courier" font-size="12" fill="#e94560">Abr 20 08:22:11 servidor systemd[1]: Failed to start ServicoWeb.service</text>
  <text x="50" y="314" font-family="Courier" font-size="12" fill="#e94560">Abr 20 08:45:33 servidor dbus[890]: Erro de conexão com o Banco de Dados</text>
  <text x="50" y="331" font-family="Courier" font-size="12" fill="#e94560">Abr 20 09:12:05 servidor nginx: [error] 1234#1234: *5678 connect() failed</text>
  
  <text x="50" y="365" font-family="Courier" font-size="14" fill="#27ae60">alan@servidor-usina:~$ <tspan fill="#e9c46a">_</tspan></text>
  
  <!-- Command Reference -->
  <rect x="450" y="280" width="220" height="120" rx="5" fill="#16213e" stroke="#0f3460"/>
  <text x="560" y="300" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">COMANDOS ESSENCIAIS</text>
  
  <text x="460" y="320" font-family="Courier" font-size="10" fill="#60a5fa">ls -la</text>
  <text x="530" y="320" font-family="Arial" font-size="9" fill="#888">Listar arquivos</text>
  
  <text x="460" y="335" font-family="Courier" font-size="10" fill="#60a5fa">cd</text>
  <text x="530" y="335" font-family="Arial" font-size="9" fill="#888">Mudar diretório</text>
  
  <text x="460" y="350" font-family="Courier" font-size="10" fill="#60a5fa">grep</text>
  <text x="530" y="350" font-family="Arial" font-size="9" fill="#888">Buscar texto</text>
  
  <text x="460" y="365" font-family="Courier" font-size="10" fill="#60a5fa">ps aux</text>
  <text x="530" y="365" font-family="Arial" font-size="9" fill="#888">Listar processos</text>
  
  <text x="460" y="380" font-family="Courier" font-size="10" fill="#60a5fa">top</text>
  <text x="530" y="380" font-family="Arial" font-size="9" fill="#888">Monitorar CPU/RAM</text>
  
  <text x="460" y="395" font-family="Courier" font-size="10" fill="#60a5fa">df -h</text>
  <text x="530" y="395" font-family="Arial" font-size="9" fill="#888">Espaço em disco</text>
</svg>