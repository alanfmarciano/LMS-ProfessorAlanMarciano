<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="30" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">FUNÇÕES DO EXCEL</text>
  <text x="400" y="50" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">O Motor Matemático das Planilhas</text>
  
  <!-- Grid -->
  <rect x="30" y="70" width="450" height="380" fill="#217346" rx="5"/>
  
  <!-- Header -->
  <rect x="30" y="70" width="450" height="30" fill="#185c37"/>
  <text x="100" y="90" font-family="Arial" font-size="12" fill="#fff">Arquivo</text>
  <text x="160" y="90" font-family="Arial" font-size="12" fill="#fff">Início</text>
  <text x="220" y="90" font-family="Arial" font-size="12" fill="#fff">Inserir</text>
  <text x="290" y="90" font-family="Arial" font-size="12" fill="#fff">Layout da Página</text>
  
  <!-- Columns -->
  <rect x="30" y="100" width="35" height="350" fill="#e8e8e8"/>
  <text x="47" y="130" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">A</text>
  <text x="47" y="165" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">B</text>
  <text x="47" y="200" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">C</text>
  <text x="47" y="235" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">D</text>
  <text x="47" y="270" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">E</text>
  <text x="47" y="305" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">F</text>
  
  <!-- Column Headers -->
  <rect x="65" y="100" width="415" height="25" fill="#f3f3f3"/>
  <text x="90" y="118" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">A</text>
  <text x="160" y="118" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">B</text>
  <text x="230" y="118" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">C</text>
  <text x="300" y="118" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">D</text>
  <text x="370" y="118" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">E</text>
  <text x="440" y="118" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">F</text>
  
  <!-- Data -->
  <!-- Header Row -->
  <rect x="65" y="125" width="415" height="25" fill="#d9e2f3" stroke="#ccc"/>
  <text x="90" y="143" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">Produto</text>
  <text x="160" y="143" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">Quantidade</text>
  <text x="230" y="143" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">Preço Unit.</text>
  <text x="300" y="143" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">Desconto</text>
  <text x="370" y="143" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">Total</text>
  <text x="440" y="143" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">Status</text>
  
  <!-- Data Rows -->
  <rect x="65" y="150" width="415" height="25" fill="#fff" stroke="#ccc"/>
  <text x="90" y="168" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Parafuso</text>
  <text x="160" y="168" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">500</text>
  <text x="230" y="168" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">R$ 2,50</text>
  <text x="300" y="168" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">10%</text>
  <text x="370" y="168" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">R$ 1.125</text>
  <rect x="430" y="153" width="45" height="20" fill="#27ae60" rx="3"/>
  <text x="452" y="168" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">OK</text>
  
  <rect x="65" y="175" width="415" height="25" fill="#f2f2f2" stroke="#ccc"/>
  <text x="90" y="193" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Porca</text>
  <text x="160" y="193" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">1.200</text>
  <text x="230" y="193" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">R$ 0,80</text>
  <text x="300" y="193" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">5%</text>
  <text x="370" y="193" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">R$ 912</text>
  <rect x="430" y="178" width="45" height="20" fill="#27ae60" rx="3"/>
  <text x="452" y="193" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">OK</text>
  
  <rect x="65" y="200" width="415" height="25" fill="#fff" stroke="#ccc"/>
  <text x="90" y="218" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Arruela</text>
  <text x="160" y="218" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">800</text>
  <text x="230" y="218" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">R$ 0,30</text>
  <text x="300" y="218" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">0%</text>
  <text x="370" y="218" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">R$ 240</text>
  <rect x="430" y="203" width="45" height="20" fill="#e74c3c" rx="3"/>
  <text x="452" y="218" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">ALERTA</text>
  
  <!-- Formula Bar -->
  <rect x="30" y="460" width="450" height="30" fill="#fff" stroke="#ccc"/>
  <text x="45" y="480" font-family="Courier" font-size="11" fill="#333">fx =SE(E2&lt;100;"ALERTA";"OK")</text>
  
  <!-- Functions Reference Panel -->
  <rect x="500" y="70" width="270" height="380" rx="5" fill="#16213e" stroke="#34495e"/>
  <text x="635" y="95" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">FUNÇÕES ESSENCIAIS</text>
  
  <text x="520" y="130" font-family="Courier" font-size="12" fill="#27ae60">SOMA()</text>
  <text x="620" y="130" font-family="Arial" font-size="10" fill="#a8d8ff">=SOMA(A1:A10)</text>
  <text x="520" y="145" font-family="Courier" font-size="12" fill="#888">Soma valores</text>
  
  <text x="520" y="175" font-family="Courier" font-size="12" fill="#27ae60">MEDIA()</text>
  <text x="620" y="175" font-family="Arial" font-size="10" fill="#a8d8ff">=MEDIA(B1:B10)</text>
  <text x="520" y="190" font-family="Courier" font-size="12" fill="#888">Média aritmética</text>
  
  <text x="520" y="220" font-family="Courier" font-size="12" fill="#27ae60">SE()</text>
  <text x="620" y="220" font-family="Arial" font-size="10" fill="#a8d8ff">=SE(condição;V;F)</text>
  <text x="520" y="235" font-family="Courier" font-size="12" fill="#888">Condicional</text>
  
  <text x="520" y="265" font-family="Courier" font-size="12" fill="#27ae60">PROCV()</text>
  <text x="620" y="265" font-family="Arial" font-size="10" fill="#a8d8ff">=PROCV(valor;tab;col;0)</text>
  <text x="520" y="280" font-family="Courier" font-size="12" fill="#888">Busca vertical</text>
  
  <text x="520" y="310" font-family="Courier" font-size="12" fill="#27ae60">CONT.SE()</text>
  <text x="620" y="310" font-family="Arial" font-size="10" fill="#a8d8ff">=CONT.SE(A:A;"OK")</text>
  <text x="520" y="325" font-family="Courier" font-size="12" fill="#888">Contagem condicional</text>
  
  <text x="520" y="355" font-family="Courier" font-size="12" fill="#27ae60">SOMASE()</text>
  <text x="620" y="355" font-family="Arial" font-size="10" fill="#a8d8ff">=SOMASE(A:A;"OK";B:B)</text>
  <text x="520" y="370" font-family="Courier" font-size="12" fill="#888">Soma condicional</text>
  
  <text x="520" y="400" font-family="Courier" font-size="12" fill="#f39c12">ÍNDICE()</text>
  <text x="620" y="400" font-family="Arial" font-size="10" fill="#a8d8ff">=ÍNDICE(A:A;CORRESP(...))</text>
  <text x="520" y="415" font-family="Courier" font-size="12" fill="#888">Busca avançada</text>
</svg>